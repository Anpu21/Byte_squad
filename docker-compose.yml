services:
  frontend:
    build:
      context: ./frontend
      target: development
    container_name: ledgerpro-frontend
    ports:
      - "${FRONTEND_PORT:-5000}:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.ts:/app/vite.config.ts
      - /app/node_modules
    env_file:
      - .env
    environment:
      - VITE_API_URL=${VITE_API_URL}
      - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
      - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
    depends_on:
      - backend
    networks:
      - ledgerpro-network

  backend:
    build:
      context: ./backend
      target: development
    container_name: ledgerpro-backend
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    volumes:
      - ./backend/src:/app/src
      - ./backend/tsconfig-paths-bootstrap.js:/app/tsconfig-paths-bootstrap.js
      - /app/node_modules
    env_file:
      - .env
    environment:
      - PORT=${PORT}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - DB_SYNC=${DB_SYNC}
      - DB_LOGGING=${DB_LOGGING}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN}
      - CORS_ORIGIN=${CORS_ORIGIN}
      - MAIL_HOST=${MAIL_HOST}
      - MAIL_PORT=${MAIL_PORT}
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - MAIL_FROM=${MAIL_FROM}
      - TEMP_PASSWORD_EXPIRES_HOURS=${TEMP_PASSWORD_EXPIRES_HOURS}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
      - PAYHERE_MERCHANT_ID=${PAYHERE_MERCHANT_ID}
      - PAYHERE_MERCHANT_SECRET=${PAYHERE_MERCHANT_SECRET}
      - BACKEND_PUBLIC_URL=${BACKEND_PUBLIC_URL:-http://localhost:3000}
      - PAYHERE_CHECKOUT_URL=${PAYHERE_CHECKOUT_URL:-https://sandbox.payhere.lk/pay/checkout}
      - PAYHERE_NOTIFY_URL=${PAYHERE_NOTIFY_URL}
      - PAYHERE_RETURN_URL=${PAYHERE_RETURN_URL}
      - PAYHERE_CANCEL_URL=${PAYHERE_CANCEL_URL}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ledgerpro-network

  postgres:
    image: postgres:16-alpine
    container_name: ledgerpro-postgres
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ledgerpro-network

# ── Volumes ──────────────────────────────────────────────
volumes:
  pgdata:

# ── Networks ─────────────────────────────────────────────
networks:
  ledgerpro-network:
    driver: bridge
