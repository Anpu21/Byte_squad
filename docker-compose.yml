services:
  frontend:
    build:
      context: ./frontend
      target: development
    container_name: ledgerpro-frontend
    ports:
      - "${FRONTEND_PORT:-5000}:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.ts:/app/vite.config.ts
      - /app/node_modules
    env_file:
      - .env
    environment:
      - VITE_API_URL=${VITE_API_URL}
      - VITE_SOCKET_URL=${VITE_SOCKET_URL:-http://localhost:4001}
      - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
      - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
    depends_on:
      - backend
    networks:
      - ledgerpro-network

  backend:
    build:
      context: ./backend
      target: development
    container_name: ledgerpro-backend
    ports:
      - "${BACKEND_PORT:-3000}:${PORT:-3000}"
    volumes:
      - ./backend/src:/app/src
      - ./backend/tsconfig-paths-bootstrap.js:/app/tsconfig-paths-bootstrap.js
      - /app/node_modules
    env_file:
      - .env
    environment:
      - PORT=${PORT}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - DB_SYNC=${DB_SYNC}
      - DB_LOGGING=${DB_LOGGING}
      # RS256 access-token signing (JWKS). Production REQUIRES JWT_PRIVATE_KEY
      # (raw PEM or base64) + JWT_KEY_ID; JWT_PUBLIC_KEY is derived if unset.
      - JWT_PRIVATE_KEY=${JWT_PRIVATE_KEY}
      - JWT_PUBLIC_KEY=${JWT_PUBLIC_KEY}
      - JWT_KEY_ID=${JWT_KEY_ID}
      - JWT_ISSUER=${JWT_ISSUER}
      - JWT_AUDIENCE=${JWT_AUDIENCE}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN}
      - JWT_REFRESH_EXPIRES_IN=${JWT_REFRESH_EXPIRES_IN}
      - CORS_ORIGIN=${CORS_ORIGIN}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - MAIL_HOST=${MAIL_HOST}
      - MAIL_PORT=${MAIL_PORT}
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - MAIL_FROM=${MAIL_FROM}
      - TEMP_PASSWORD_EXPIRES_HOURS=${TEMP_PASSWORD_EXPIRES_HOURS}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
      # ── PayHere card gateway ─────────────────────────────────────────
      # Card payments are processed by PayHere; everything below is env-driven.
      # GO LIVE (after the partner bank approves the gateway):
      #   1. Set live PAYHERE_MERCHANT_ID + PAYHERE_MERCHANT_SECRET.
      #   2. Set PAYHERE_CHECKOUT_URL=https://www.payhere.lk/pay/checkout
      #      (default below is the sandbox — safe for dev/testing).
      #   3. Point NOTIFY/RETURN/CANCEL URLs at the public HTTPS live domain.
      - PAYHERE_MERCHANT_ID=${PAYHERE_MERCHANT_ID}
      - PAYHERE_MERCHANT_SECRET=${PAYHERE_MERCHANT_SECRET}
      - BACKEND_PUBLIC_URL=${BACKEND_PUBLIC_URL:-http://localhost:3000}
      - PAYHERE_CHECKOUT_URL=${PAYHERE_CHECKOUT_URL:-https://sandbox.payhere.lk/pay/checkout}
      - PAYHERE_NOTIFY_URL=${PAYHERE_NOTIFY_URL}
      - PAYHERE_RETURN_URL=${PAYHERE_RETURN_URL}
      - PAYHERE_CANCEL_URL=${PAYHERE_CANCEL_URL}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ledgerpro-network

  postgres:
    image: postgres:16-alpine
    container_name: ledgerpro-postgres
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ledgerpro-network

  # Event bus for realtime fan-out to the ledgerpro-realtime service, and the
  # socket.io Redis adapter backing store. Internal-only (no published port).
  redis:
    image: redis:7-alpine
    container_name: ledgerpro-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - ledgerpro-network

  # Standalone realtime WebSocket service (separate repo ../ledgerpro-realtime).
  # Verifies handshake JWTs against the backend's JWKS over the internal network
  # and fans redis-published notifications/system events out to clients.
  realtime:
    build:
      context: ../ledgerpro-realtime
      target: development
    container_name: ledgerpro-realtime
    ports:
      # Host default 4001 to match the frontend's VITE_SOCKET_URL default (and the
      # WSL REALTIME_PORT=4001 override); the container always listens on 3001.
      - "${REALTIME_PORT:-4001}:3001"
    volumes:
      - ../ledgerpro-realtime/src:/app/src
      - ../ledgerpro-realtime/tsconfig-paths-bootstrap.js:/app/tsconfig-paths-bootstrap.js
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=3001
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
      - REDIS_URL=redis://redis:6379
      - REALTIME_REDIS_CHANNEL=ledgerpro:realtime
      - JWKS_URI=http://backend:4000/.well-known/jwks.json
      - JWT_ISSUER=ledgerpro-backend
      - JWT_AUDIENCE=ledgerpro-api
      - BACKEND_BASE_URL=http://backend:4000
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${CHAT_DB_NAME:-chat}
      - DB_SYNC=true
      - DB_LOGGING=false
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_started
      postgres:
        condition: service_healthy
    networks:
      - ledgerpro-network

# ── Volumes ──────────────────────────────────────────────
volumes:
  pgdata:
  redisdata:

# ── Networks ─────────────────────────────────────────────
networks:
  ledgerpro-network:
    driver: bridge
