# ╔═══════════════════════════════════════════════════════════════════╗
# ║  LedgerPro — Production compose (DigitalOcean droplet)             ║
# ╚═══════════════════════════════════════════════════════════════════╝
#
# Runs the backend from the GHCR image (no build here) against an EXTERNAL
# Postgres (DB_* in .env). The one-shot `migrate` service runs TypeORM
# migrations and the backend waits for it to succeed — reproducing the Fly
# release_command. All config comes from ./.env (chmod 600, never committed);
# see .env.production.example for the full variable list.
#
# Deploy is driven by .github/workflows/deploy-production.yml, which on the
# droplet runs:  docker compose -f docker-compose.prod.yml pull && up -d
# (IMAGE_TAG is exported by the deploy job to pin the freshly-built image).

services:
  migrate:
    image: ${BACKEND_IMAGE:-ghcr.io/anpu21/ledgerpro-backend}:${IMAGE_TAG:-latest}
    container_name: ledgerpro-migrate
    command:
      [
        "node",
        "-r",
        "./tsconfig-paths-bootstrap.js",
        "./node_modules/typeorm/cli.js",
        "migration:run",
        "-d",
        "dist/data-source.js",
      ]
    env_file: .env
    restart: "no"
    networks: [ledgerpro-network]

  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/anpu21/ledgerpro-backend}:${IMAGE_TAG:-latest}
    container_name: ledgerpro-backend
    depends_on:
      migrate:
        # Migrations must apply cleanly before the app serves traffic; a failed
        # migration aborts `compose up`, so the old container keeps running.
        condition: service_completed_successfully
    env_file: .env
    ports:
      # Bind to localhost only — a reverse proxy (nginx/Caddy) terminates TLS
      # on 443 and forwards to 127.0.0.1:3000 (with WebSocket upgrade).
      - "127.0.0.1:3000:3000"
    restart: always
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:3000/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks: [ledgerpro-network]

networks:
  ledgerpro-network:
    driver: bridge
