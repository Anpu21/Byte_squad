# ╔═══════════════════════════════════════════════════════════╗
# ║  LedgerPro — Production CI/CD                              ║
# ║  Test (BE + FE) → Deploy backend (Fly) → Deploy frontend  ║
# ╚═══════════════════════════════════════════════════════════╝
#
# On push to main: both test suites run in parallel; on success the Fly backend
# deploys (its release_command runs pending DB migrations), then the Cloudflare
# Pages frontend deploys. A failing test blocks both deploys; a failing
# migration aborts the backend release so the frontend never ships.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   FLY_API_TOKEN          — fly tokens create deploy -a ledgerpro-api
#   CLOUDFLARE_API_TOKEN   — Account · Cloudflare Pages · Edit
#   CLOUDFLARE_ACCOUNT_ID
#   VITE_API_URL           — https://api.ledgerpro.shop/api/v1
#   VITE_SOCKET_URL        — https://api.ledgerpro.shop

name: Deploy Production

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  test-backend:
    name: Test · Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: backend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm run test --passWithNoTests
      - run: pnpm run build

  test-frontend:
    name: Test · Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm run typecheck
      - run: pnpm run test
      - run: pnpm run build

  deploy-backend:
    name: Deploy · Backend (Fly)
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy to Fly (release_command runs pending DB migrations)
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-frontend:
    name: Deploy · Frontend (Cloudflare Pages)
    needs: [deploy-backend]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_SOCKET_URL: ${{ secrets.VITE_SOCKET_URL }}
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: frontend
          command: pages deploy dist --project-name=ledgerpro --branch=main
